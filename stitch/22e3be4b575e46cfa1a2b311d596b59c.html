<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FixLoop Smoke Board</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=Inter:wght@400;500;700&amp;family=Geist:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#581e00",
                        "surface-container-low": "#131b2e",
                        "tertiary-fixed-dim": "#ffb596",
                        "error-container": "#93000a",
                        "inverse-on-surface": "#283044",
                        "surface": "#0b1326",
                        "surface-container-highest": "#2d3449",
                        "primary": "#b4c5ff",
                        "surface-bright": "#31394d",
                        "primary-container": "#2563eb",
                        "surface-tint": "#b4c5ff",
                        "surface-container-high": "#222a3d",
                        "outline-variant": "#434655",
                        "on-primary-fixed": "#00174b",
                        "background": "#0b1326",
                        "on-primary-fixed-variant": "#003ea8",
                        "surface-container-lowest": "#060e20",
                        "inverse-primary": "#0053db",
                        "on-background": "#dae2fd",
                        "primary-fixed": "#dbe1ff",
                        "surface-dim": "#0b1326",
                        "inverse-surface": "#dae2fd",
                        "surface-container": "#171f33",
                        "on-secondary": "#213145",
                        "secondary-fixed": "#d3e4fe",
                        "secondary-fixed-dim": "#b7c8e1",
                        "tertiary-fixed": "#ffdbcd",
                        "on-secondary-fixed-variant": "#38485d",
                        "on-surface": "#dae2fd",
                        "on-primary": "#002a78",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed": "#360f00",
                        "surface-variant": "#2d3449",
                        "secondary-container": "#3a4a5f",
                        "secondary": "#b7c8e1",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "outline": "#8d90a0",
                        "tertiary": "#ffb596",
                        "on-error": "#690005",
                        "tertiary-container": "#bc4800",
                        "on-surface-variant": "#c3c6d7",
                        "on-tertiary-container": "#ffede6",
                        "on-secondary-container": "#a9bad3",
                        "on-secondary-fixed": "#0b1c30",
                        "on-primary-container": "#eeefff",
                        "primary-fixed-dim": "#b4c5ff",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "lg": "24px",
                        "md": "16px",
                        "xl": "32px",
                        "xs": "4px",
                        "base": "4px",
                        "sm": "8px",
                        "gutter": "12px",
                        "margin-desktop": "24px"
                    },
                    "fontFamily": {
                        "code-md": ["JetBrains Mono"],
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "code-sm": ["JetBrains Mono"],
                        "headline-md": ["Geist"],
                        "display-sm": ["Geist"],
                        "label-caps": ["Inter"]
                    },
                    "fontSize": {
                        "code-md": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "code-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "display-sm": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "label-caps": ["10px", { "lineHeight": "12px", "letterSpacing": "0.05em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #22c55e;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #22c55e;
        }
        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface border-b border-outline-variant dark:border-outline-variant w-full top-0 flex justify-between items-center px-margin-desktop py-sm w-full">
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary">
            FixLoop Smoke Board
        </div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform p-xs rounded">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</button>
<button class="text-on-surface-variant hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform p-xs rounded">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center p-lg md:p-xl gap-xl w-full max-w-3xl mx-auto">
<!-- Header Section -->
<section class="w-full flex justify-between items-center bg-surface-container-low p-md rounded-lg border border-outline-variant">
<div>
<h1 class="font-display-sm text-display-sm text-on-surface">Current Status</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Monitoring core loop integrity</p>
</div>
<div class="flex items-center gap-sm">
<span class="font-label-caps text-label-caps text-on-surface uppercase" id="statusLabel">Ready</span>
<div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-transform duration-200 ease-in-out border-outline-variant" id="ACT_TOGGLE_STATUS" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-5 rounded-full bg-surface-variant cursor-pointer transition-colors duration-200 ease-in-out" for="ACT_TOGGLE_STATUS"></label>
</div>
</div>
</section>
<!-- Status Cards Bento Grid -->
<section class="w-full grid grid-cols-1 md:grid-cols-3 gap-gutter">
<!-- Card 1: System Health -->
<div class="bg-surface-container p-md rounded-lg border border-outline-variant flex flex-col gap-sm">
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">System Health</span>
<div class="w-2 h-2 rounded-full bg-green-500 status-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
</div>
<div class="font-headline-md text-headline-md text-on-surface">99.9%</div>
<div class="font-code-sm text-code-sm text-on-surface-variant bg-surface-container-highest px-xs py-[2px] rounded w-fit">UPTIME_LAST_24H</div>
</div>
<!-- Card 2: API Connectivity -->
<div class="bg-surface-container p-md rounded-lg border border-outline-variant flex flex-col gap-sm">
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">API Connectivity</span>
<div class="w-2 h-2 rounded-full bg-green-500 status-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
</div>
<div class="font-headline-md text-headline-md text-on-surface">Stable</div>
<div class="font-code-sm text-code-sm text-on-surface-variant bg-surface-container-highest px-xs py-[2px] rounded w-fit">ALL_ENDPOINTS_OK</div>
</div>
<!-- Card 3: Database Latency -->
<div class="bg-surface-container p-md rounded-lg border border-outline-variant flex flex-col gap-sm">
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">DB Latency</span>
<div class="w-2 h-2 rounded-full bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.6)]"></div>
</div>
<div class="font-headline-md text-headline-md text-on-surface">24ms</div>
<div class="font-code-sm text-code-sm text-on-surface-variant bg-surface-container-highest px-xs py-[2px] rounded w-fit">AVG_QUERY_TIME</div>
</div>
</section>
<!-- Controls Section -->
<section class="w-full flex flex-col items-center gap-sm mt-md">
<button class="w-full md:w-auto bg-primary-container text-on-primary-container font-headline-md text-headline-md px-xl py-md rounded-lg hover:bg-primary hover:text-on-primary transition-colors active:scale-[0.98] flex items-center justify-center gap-sm shadow-sm" id="ACT_REFRESH_STATUS">
<span class="material-symbols-outlined" data-icon="sync">sync</span>
                Refresh Status
            </button>
<div class="font-code-md text-code-md text-on-surface-variant mt-sm">
                Last Updated: <span id="timestamp">2023-10-27 14:30:05 UTC</span>
</div>
</section>
<!-- Error State / Metadata -->
<section class="w-full mt-auto mb-lg">
<div class="bg-surface-container-lowest border border-outline-variant rounded p-sm flex items-center gap-sm text-on-surface-variant font-code-sm text-code-sm">
<span class="material-symbols-outlined text-sm" data-icon="info">info</span>
<span>System message: No local state errors detected. Event stream connected.</span>
</div>
</section>
</main>
<script>
        // Simple interactivity for the toggle and refresh button
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('ACT_TOGGLE_STATUS');
            const statusLabel = document.getElementById('statusLabel');
            const refreshBtn = document.getElementById('ACT_REFRESH_STATUS');
            const timestamp = document.getElementById('timestamp');

            toggle.addEventListener('change', (e) => {
                if(e.target.checked) {
                    statusLabel.textContent = 'READY';
                    statusLabel.classList.replace('text-on-surface-variant', 'text-on-surface');
                } else {
                    statusLabel.textContent = 'PAUSED';
                    statusLabel.classList.replace('text-on-surface', 'text-on-surface-variant');
                }
            });

            refreshBtn.addEventListener('click', () => {
                const icon = refreshBtn.querySelector('.material-symbols-outlined');
                icon.style.animation = 'spin 1s linear infinite';
                
                setTimeout(() => {
                    icon.style.animation = 'none';
                    const now = new Date();
                    timestamp.textContent = now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
                }, 800);
            });
            
            // Add custom keyframes for the spin animation in JS to keep HTML clean
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes spin {
                    100% { transform: rotate(360deg); }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body></html>
